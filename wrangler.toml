name = "pmi-dashboard"
main = "src/index.ts"
compatibility_date = "2025-11-01"
compatibility_flags = ["nodejs_compat"]

# ─── D1 Database ───────────────────────────────────────────────────────────────
[[d1_databases]]
binding = "DB"
database_name = "signaldesk-db"
database_id = "8c7c8b75-3019-4cff-8469-22fd4a46a343"

# ─── Workers AI ────────────────────────────────────────────────────────────────
[ai]
binding = "AI"

# ─── KV Namespace ──────────────────────────────────────────────────────────────
[[kv_namespaces]]
binding = "CACHE"
id = "edb9427f2b374eafa56699164c3ffdc3"
preview_id = "42a04541d7224080b3bac6bb10e9199c"

# ─── R2 Bucket ─────────────────────────────────────────────────────────────────
[[r2_buckets]]
binding = "RAW_PAYLOADS"
bucket_name = "signaldesk-raw"

# ─── Workflows ─────────────────────────────────────────────────────────────────
[[workflows]]
binding = "INGEST_WORKFLOW"
name = "feedback-ingest"
class_name = "FeedbackIngestWorkflow"
script_name = "pmi-dashboard"

# ─── Cloudflare Access (not locally testable) ──────────────────────────────────
# Configure at: dash.cloudflare.com → Zero Trust → Access → Applications
# Policy: Email domain = @your-org.com
# Optional: WARP device posture for security_team_only routes
