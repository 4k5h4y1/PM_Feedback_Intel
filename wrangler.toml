name = "pmi-dashboard"
main = "src/index.ts"
compatibility_date = "2025-11-01"
compatibility_flags = ["nodejs_compat"]

# ─── D1 Database ───────────────────────────────────────────────────────────────
[[d1_databases]]
binding = "DB"
database_name = "signaldesk-db"
database_id = "8c7c8b75-3019-4cff-8469-22fd4a46a343"

# ─── Workers AI ────────────────────────────────────────────────────────────────
[ai]
binding = "AI"

# ─── KV Namespace (cache) ──────────────────────────────────────────────────────
[[kv_namespaces]]
binding = "CACHE"
id = "edb9427f2b374eafa56699164c3ffdc3"          # Replace after: wrangler kv namespace create signaldesk-cache
preview_id = "42a04541d7224080b3bac6bb10e9199c"  # Replace after: wrangler kv namespace create signaldesk-cache --preview

# ─── R2 Bucket (raw payloads) ──────────────────────────────────────────────────
[[r2_buckets]]
binding = "RAW_PAYLOADS"
bucket_name = "signaldesk-raw"  # Replace after: wrangler r2 bucket create signaldesk-raw

# ─── Workflows ─────────────────────────────────────────────────────────────────
[[workflows]]
binding = "INGEST_WORKFLOW"
name = "feedback-ingest"
class_name = "FeedbackIngestWorkflow"  # Must match named export in src/index.ts
script_name = "pmi-dashboard"

# ─── Cloudflare Access (architecture reference — not locally testable) ──────────
# Secure this Worker by creating an Access application at:
#   dash.cloudflare.com → Zero Trust → Access → Applications
# Policy: Email domain = @cloudflare.com
# Optional: WARP posture check for security_team_only routes
